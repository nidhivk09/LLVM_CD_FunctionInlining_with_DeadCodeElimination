<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLVM Pass Visualizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="loading">Loading...</div>

<nav id="sidebar">
  <div class="sidebar-logo">
    <h1>LLVM Optimizer</h1>
    <p>Inline + DCE</p>
  </div>

  <div class="sidebar-section">Test Files</div>
  <div class="file-list" id="file-list"></div>

  <div class="threshold-section">
    <div class="threshold-label">
      <span>Cost Threshold</span>
      <span id="threshold-val">45</span>
    </div>
    <input type="range" id="threshold" min="1" max="200" value="45" oninput="onThreshold(this.value)">
  </div>

  <label class="diff-toggle">
    <input type="checkbox" id="diff-toggle" checked onchange="renderTimeline()">
    Highlight Differences
  </label>
</nav>

<main id="main">
  <div class="tab-bar">
    <div class="tab active" onclick="switchTab('ir')">Visualizer</div>
    <div class="tab" onclick="switchTab('summary')">Test Suite</div>
  </div>

  <!-- ── Visualizer Tab ── -->
  <div id="tab-ir" class="tab-content active">
    <div class="top-bar">
      <div class="page-title" id="page-title">—</div>
    </div>
    
    <div style="display:flex; gap:20px; margin-bottom:40px;">
        <div style="flex: 1;">
            <div class="section-label">Phase 1 — Analysis & Decisions</div>
            <div class="cards-row" id="cards-row" style="margin-bottom: 20px;"></div>
            
            <div class="section-label">Cost vs Threshold</div>
            <div id="cost-charts" class="cost-charts-container"></div>
        </div>
    </div>

    <div id="metrics-section" style="display:none">
      <div class="section-label">Optimization Impact</div>
      <div class="metrics-row" id="metrics-row"></div>
    </div>

    <div class="section-label" style="display:flex;justify-content:space-between;align-items:center;margin-top:20px;">
      <span>Transformation Timeline</span>
    </div>
    
    <div class="timeline-stepper">
      <button id="step-1" class="step-btn active" onclick="setStep(1)">1. Original C</button>
      <div class="step-line"></div>
      <button id="step-2" class="step-btn" onclick="setStep(2)">2. Initial IR</button>
      <div class="step-line"></div>
      <button id="step-3" class="step-btn" onclick="setStep(3)">3. Inlined IR</button>
      <div class="step-line"></div>
      <button id="step-4" class="step-btn" onclick="setStep(4)">4. DCE'd IR</button>
      <div class="step-line"></div>
      <button id="step-5" class="step-btn" onclick="setStep(5)">5. Final C</button>
    </div>

    <!-- Container for dynamic code rows -->
    <div id="code-container"></div>

    <div id="legend" class="legend" style="display:none">
      <div class="legend-item">
        <span class="legend-chip" style="background:var(--blocked-bg);color:var(--blocked);border-color:var(--blocked-border)">Red</span>
        Removed / Dead Code
      </div>
      <div class="legend-item">
        <span class="legend-chip" style="background:var(--inline-bg);color:var(--inline);border-color:var(--inline-border)">Green</span>
        Inlined / Added Code
      </div>
      <div class="legend-item">
        <span class="legend-chip" style="background:var(--skip-bg);color:var(--skip);border-color:var(--skip-border)">Amber</span>
        Function Call
      </div>
    </div>
  </div>

  <!-- ── All Tests Tab ── -->
  <div id="tab-summary" class="tab-content">
    <div class="top-bar">
      <div class="page-title">Test Suite Overview</div>
    </div>
    <div class="section-label">Cross-test Results</div>
    <div id="summary-table-wrap"></div>
  </div>

</main>

<script src="/static/main.js"></script>
</body>
</html>

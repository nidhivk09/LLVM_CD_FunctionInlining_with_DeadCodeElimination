name: Build and Test InlineDCEPass

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Cache the LLVM installation so repeat runs are fast (~1 min vs ~3 min)
      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: /usr/lib/llvm-19
          key: llvm-19-ubuntu-${{ runner.os }}

      - name: Install LLVM 19
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt-get update -q
          sudo apt-get install -y \
            llvm-19 \
            llvm-19-dev \
            llvm-19-tools \
            libllvm19 \
            clang-19 \
            ninja-build \
            cmake

      - name: Ensure tools on PATH (cache hit path)
        run: sudo apt-get install -y ninja-build cmake 2>/dev/null || true

      - name: Build plugin
        run: |
          set -x  # print every command before running it
          pwd
          ls -la  # confirm we're in the repo root
          
          mkdir -p pass-build
          
          cmake -S . -B pass-build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_BUILD_DIR=/usr/lib/llvm-19 \
            || { echo "CMAKE CONFIGURE FAILED"; exit 1; }
          
          cmake --build pass-build -- -v \
            || { echo "NINJA BUILD FAILED"; ls -la pass-build/; exit 1; }
          
          echo "=== pass-build contents ==="
          ls -la pass-build/
          
          echo "=== find any .so files ==="
          find . -name "*.so" 2>/dev/null || echo "none found"

      - name: Debug single test
        run: |
          echo "=== checking plugin before opt ==="
          ls -la pass-build/ || echo "pass-build missing entirely"
          
          /usr/lib/llvm-19/bin/opt \
            -load-pass-plugin ./pass-build/InlineDCEPass.so \
            -passes=inline-dce \
            -S tests/small_func.ll \
            -o /tmp/out.ll 2>&1

      - name: Run test suite
        run: |
          chmod +x run.sh
          LLVM_BUILD=/usr/lib/llvm-19 ./run.sh

      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-outputs
          path: tests/output/